version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    groups:
      production-deps:
        dependency-type: production
        update-types: [ minor, patch ]
      dev-deps:
        dependency-type: development
        update-types: [ minor, patch ]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
